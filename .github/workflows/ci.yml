name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # stdcompat (pyml dependency) requires ocaml (>= 4.11 & < 4.14.3) | (>= 5.0 & < 5.4);
        # add newer compilers back when a stdcompat release supports them
        ocaml-compiler: ["4.14.2", "5.3"]

    runs-on: ${{ matrix.os }}

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-venv pkg-config
          python3 -m venv "$HOME/qiskit-venv"
          "$HOME/qiskit-venv/bin/pip" install qiskit qiskit-aer qiskit-ibm-runtime matplotlib pylatexenc
          echo "$HOME/qiskit-venv/bin" >> "$GITHUB_PATH"

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install opam dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest
